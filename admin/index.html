<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Promo JP II | Panel Admin</title>

  <!-- DataTables -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- ESTILOS -->
  <link rel="stylesheet" href="./estilos/style.css" />

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <!-- LIBRERIAS -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" defer></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js" defer></script>

  <!-- CONFIG -->
  <script src="../config.js" defer></script>

  <!-- LOGICA -->
  <script src="admin.js" defer></script>

</head>

<body>

  <div class="container">
    <!-- HEADER -->
    <header class="header">
      <div>

        <h1>
          <i class="fa-solid fa-chart-line"></i> Panel Admin
        </h1>

        <p>
          Gestión de camisetas
        </p>

      </div>

    </header>

    <!-- ACCIONES -->
    <section class="acciones">

      <button type="button" class="btn-excel" onclick="exportarExcel()">

        <i class="fa-solid fa-file-excel"></i>Excel

      </button>

      <button type="button" class="btn-ods" onclick="exportarODS()">

        <i class="fa-solid fa-file"></i> ODS

      </button>

      <button type="button" class="btn-pdf" onclick="exportarPDF()">

        <i class="fa-solid fa-file-pdf"></i> PDF

      </button>

    </section>

    <!-- BUSCADOR -->
    <section class="buscador">
      <div class="search-box">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input type="text" id="buscar" placeholder="Buscar estudiante..." />

      </div>

    </section>

    <!-- FORMULARIO -->

    <section class="formulario-card">

      <h2>

        <i class="fa-solid fa-user-plus"></i> Registro de Estudiantes

      </h2>

      <div class="form-grid">

        <!-- GENERO -->

        <div class="input-group">

          <label>Género</label>

          <select id="genero">

            <option value="" disabled selected>
              Seleccionar género
            </option>

            <option value="M">
              Masculino
            </option>

            <option value="F">
              Femenino
            </option>

          </select>

        </div>

        <!-- NOMBRE -->

        <div class="input-group">

          <label>Nombre</label>

          <input type="text" id="nombre" placeholder="Ingrese nombre" />

        </div>

        <!-- TALLA -->

        <div class="input-group">

          <label>Talla</label>

          <select id="talla">

            <option value="" disabled selected>
              Seleccionar talla
            </option>

            <option value="S">S</option>

            <option value="M">M</option>

            <option value="L">L</option>

            <option value="XL">XL</option>

          </select>

        </div>

        <!-- NUMERO -->

        <div class="input-group">

          <label>Número de camiseta</label>

          <input type="number" id="numero" placeholder="Número" />

        </div>

        <!-- OBSERVACION -->

        <div class="input-group">

          <label>Observación</label>

          <select id="observacion">

            <option value="">
              Seleccionar
            </option>

            <option value="SOLO POLO">
              SOLO POLO
            </option>

            <option value="COMPLETO">
              COMPLETO
            </option>

          </select>

        </div>

      </div>

      <!-- BOTON -->

      <button type="button" class="btn-guardar" onclick="agregar()">

        <i class="fa-solid fa-floppy-disk"></i>

        Guardar Registro

      </button>

    </section>

    <!-- TABLA -->

    <section class="tabla-card">

      <div class="tabla-header">

        <h2>

          <i class="fa-solid fa-table"></i>

          Lista de Registros

        </h2>

      </div>

      <div class="tabla-responsive">

        <table id="tabla-datos" class="display">

          <thead>

            <tr>
              <th>Código</th>
              <th>Género</th>
              <th>Nombre</th>
              <th>Talla</th>
              <th>Número de Camiseta</th>
              <th>Observación</th>
              <th>Acciones</th>
            </tr>

          </thead>

          <tbody id="tabla"></tbody>

        </table>

      </div>

    </section>

  </div>

</body>

</html>
